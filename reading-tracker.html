<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shankar's Reading Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F7F4EF; --surface: #FFFFFF; --border: #E2DDD6;
    --text-primary: #1A1714; --text-secondary: #6B6560; --text-muted: #9E9890;
    --accent: #3B3280; --accent-light: #EEEDFE;
    --warn: #854F0B; --warn-light: #FAEEDA;
    --danger: #A32D2D; --danger-light: #FCEBEB;
    --ok: #3B6D11; --ok-light: #EAF3DE;
    --neutral-light: #F1EFE8; --neutral: #5F5E5A;
    --serif: 'EB Garamond', Georgia, serif; --sans: 'Inter', system-ui, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1A1714; --surface: #242019; --border: #3A3630;
      --text-primary: #F0EDE8; --text-secondary: #9E9890; --text-muted: #6B6560;
      --accent: #AFA9EC; --accent-light: #26215C;
      --warn: #FAC775; --warn-light: #412402;
      --danger: #F09595; --danger-light: #501313;
      --ok: #97C459; --ok-light: #173404;
      --neutral-light: #2C2C2A; --neutral: #B4B2A9;
    }
  }
  body { background: var(--bg); color: var(--text-primary); font-family: var(--sans); font-size: 15px; line-height: 1.6; min-height: 100vh; padding: 2rem 1rem 4rem; }
  .container { max-width: 680px; margin: 0 auto; }
  header { margin-bottom: 2.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1.25rem; }
  header h1 { font-family: var(--serif); font-size: 28px; font-weight: 400; font-style: italic; color: var(--text-primary); letter-spacing: -0.01em; }
  header .subtitle { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
  .header-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
  .sync-status { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
  .sync-status.syncing { color: var(--warn); }
  .sync-status.ok { color: var(--ok); }
  .sync-status.error { color: var(--danger); }
  .section-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 10px; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .book-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 10px; transition: border-color 0.15s; }
  .book-card:hover { border-color: var(--text-muted); }
  .book-card.archived { opacity: 0.65; }
  .book-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
  .book-title { font-family: var(--serif); font-size: 17px; font-weight: 400; color: var(--text-primary); line-height: 1.3; }
  .book-meta-line { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .badge { font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
  .badge-ok { background: var(--ok-light); color: var(--ok); }
  .badge-warn { background: var(--warn-light); color: var(--warn); }
  .badge-danger { background: var(--danger-light); color: var(--danger); }
  .badge-neutral { background: var(--neutral-light); color: var(--neutral); }
  .progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .progress-track { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
  .progress-pct { font-size: 13px; font-weight: 500; color: var(--text-primary); min-width: 38px; text-align: right; }
  .book-stats { display: flex; flex-wrap: wrap; gap: 12px; font-size: 12px; color: var(--text-secondary); }
  .book-stats .stat { display: flex; align-items: center; gap: 4px; }
  .deadline-urgent { color: var(--danger); font-weight: 500; }
  .deadline-soon { color: var(--warn); font-weight: 500; }
  .book-actions { display: flex; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); flex-wrap: wrap; }
  .action-btn { font-size: 12px; color: var(--text-muted); background: none; border: none; padding: 0; cursor: pointer; font-family: var(--sans); }
  .action-btn:hover { color: var(--text-secondary); opacity: 1; }
  .action-btn.danger:hover { color: var(--danger); }
  .notes-area { display: none; margin-top: 8px; }
  .notes-area.open { display: block; }
  textarea { width: 100%; font-family: var(--serif); font-size: 14px; line-height: 1.6; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text-primary); resize: vertical; min-height: 80px; outline: none; transition: border-color 0.15s; }
  textarea:focus { border-color: var(--accent); }
  .divider { margin: 2rem 0 1.5rem; border: none; border-top: 1px solid var(--border); }
  .chart-section { margin-bottom: 2rem; }
  .chart-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.25rem; }
  .chart-title { font-family: var(--serif); font-size: 16px; font-weight: 400; font-style: italic; color: var(--text-primary); margin-bottom: 0.75rem; }
  .chart-legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-secondary); }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  .log-section { margin-top: 2rem; }
  .log-controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  select, input[type="number"], input[type="text"], input[type="date"] { font-family: var(--sans); font-size: 13px; padding: 7px 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--text-primary); outline: none; transition: border-color 0.15s; }
  select:focus, input:focus { border-color: var(--accent); }
  select { flex: 2; min-width: 160px; }
  input[type="number"] { flex: 1; min-width: 80px; }
  button { font-family: var(--sans); font-size: 13px; font-weight: 500; padding: 7px 16px; border: 1px solid var(--border); border-radius: 8px; background: var(--accent); color: #fff; cursor: pointer; transition: opacity 0.15s; white-space: nowrap; }
  button:hover { opacity: 0.85; }
  .btn-secondary { background: transparent; color: var(--text-secondary); border-color: var(--border); }
  .btn-small { padding: 5px 12px; font-size: 12px; }
  .log-entries { margin-top: 8px; }
  .log-entry { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--text-secondary); padding: 7px 0; border-bottom: 1px solid var(--border); gap: 12px; }
  .log-entry:last-child { border-bottom: none; }
  .log-book { color: var(--text-primary); font-family: var(--serif); font-size: 13px; }
  .log-amount { color: var(--accent); font-weight: 500; white-space: nowrap; }
  .log-date { color: var(--text-muted); white-space: nowrap; }
  .constraints { margin-top: 2rem; padding: 0.875rem 1rem; background: var(--accent-light); border-radius: 8px; font-size: 12px; color: var(--text-secondary); line-height: 1.7; }
  .constraints strong { color: var(--text-primary); font-weight: 500; }
  .empty-log { font-size: 12px; color: var(--text-muted); font-style: italic; padding: 8px 0; }
  .reset-row { display: flex; justify-content: flex-end; margin-top: 0.75rem; }
  .loading-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .loading-text { font-family: var(--serif); font-size: 18px; font-style: italic; color: var(--text-muted); }

  /* Modal */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--surface); border-radius: 12px; padding: 1.5rem; width: 100%; max-width: 480px; border: 1px solid var(--border); }
  .modal h3 { font-family: var(--serif); font-size: 20px; font-weight: 400; font-style: italic; margin-bottom: 1rem; color: var(--text-primary); }
  .field { margin-bottom: 0.875rem; }
  .field label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
  .field input, .field select { width: 100%; }
  .field-row { display: flex; gap: 8px; }
  .field-row .field { flex: 1; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }

  /* Add book button */
  .add-book-btn { font-size: 12px; color: var(--accent); background: none; border: 1px solid var(--accent); border-radius: 6px; padding: 4px 10px; cursor: pointer; font-family: var(--sans); font-weight: 500; }
  .add-book-btn:hover { background: var(--accent-light); opacity: 1; }

  /* Archive section */
  .archive-toggle { font-size: 12px; color: var(--text-muted); background: none; border: none; cursor: pointer; font-family: var(--sans); padding: 0; }
  .archive-toggle:hover { color: var(--text-secondary); opacity: 1; }
  #archiveContainer { display: none; }
  #archiveContainer.open { display: block; }
</style>
</head>
<body>
<div class="loading-overlay" id="loadingOverlay">
  <span class="loading-text">Loading your books…</span>
</div>

<div class="container">
  <header>
    <div class="header-row">
      <h1>Reading tracker</h1>
      <span class="sync-status" id="syncStatus">—</span>
    </div>
    <p class="subtitle" id="todayDate"></p>
  </header>

  <div class="section-header">
    <div class="section-label" style="margin-bottom:0">Active books</div>
    <button class="add-book-btn" onclick="openAddModal()">+ Add book</button>
  </div>
  <div id="booksContainer"></div>

  <hr class="divider">

  <div class="chart-section">
    <div class="section-label">This week</div>
    <div class="chart-wrap">
      <div class="chart-title">Reading sessions</div>
      <div class="chart-legend" id="chartLegend"></div>
      <div style="position:relative;width:100%;height:200px;">
        <canvas id="weekChart"></canvas>
      </div>
    </div>
  </div>

  <div class="log-section">
    <div class="section-label">Log reading</div>
    <div class="log-controls">
      <select id="logBook"></select>
      <input type="number" id="logAmount" placeholder="Pages / locs / %" min="1" />
      <button onclick="logReading()">Save</button>
    </div>
    <div class="log-entries" id="logEntries"></div>
    <div class="reset-row">
      <button class="btn-secondary btn-small" onclick="confirmReset()">Reset all</button>
    </div>
  </div>

  <hr class="divider">

  <div class="section-header">
    <div class="section-label" style="margin-bottom:0">Completed</div>
    <button class="archive-toggle" onclick="toggleArchive()" id="archiveToggleBtn">Show</button>
  </div>
  <div id="archiveContainer"></div>

  <div class="constraints">
    <strong>Daily:</strong> 3 hrs writing · Transcribing · Substack weekly<br>
    <strong>Weekends:</strong> Iliad &amp; Shakespeare only
  </div>
</div>

<!-- Edit / Add Modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="modalTitle">Edit book</h3>
    <div class="field">
      <label>Title</label>
      <input type="text" id="fTitle" placeholder="Book title" />
    </div>
    <div class="field-row">
      <div class="field">
        <label>Author</label>
        <input type="text" id="fAuthor" placeholder="Author" />
      </div>
      <div class="field">
        <label>Group</label>
        <input type="text" id="fGroup" placeholder="CY / PBCC / Personal…" />
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Type</label>
        <select id="fType">
          <option value="percent">Percent (%)</option>
          <option value="kindle">Kindle (locations)</option>
        </select>
      </div>
      <div class="field" id="fTotalWrap">
        <label>Total locations</label>
        <input type="number" id="fTotal" placeholder="e.g. 26900" />
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Current progress</label>
        <input type="number" id="fCurrent" placeholder="0" />
      </div>
      <div class="field">
        <label>Deadline (optional)</label>
        <input type="date" id="fDeadline" />
      </div>
    </div>
    <div class="field">
      <label>Pace note (optional)</label>
      <input type="text" id="fPace" placeholder="e.g. 53 locs / 5 days" />
    </div>
    <div class="field">
      <label>Colour</label>
      <input type="color" id="fColor" style="width:48px;height:32px;padding:2px;border-radius:6px;cursor:pointer;" />
    </div>
    <div class="modal-actions">
      <button class="btn-secondary btn-small" onclick="closeModal()">Cancel</button>
      <button class="btn-small" onclick="saveModal()">Save</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://tnxibfhyvqecckiqmqtg.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRueGliZmh5dnFlY2NraXFtcXRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MzM0MjEsImV4cCI6MjA5NzAwOTQyMX0.b5-BgoOP0fnhiCnliBHCRdkF6qASrKIaiunSelfVr28';
const H = { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Prefer': 'return=representation' };

const defaultBooks = [
  { id: 'wap',      title: 'War and Peace',          author: 'Tolstoy',  group: 'War & Peace group', type: 'kindle',  current: 867, total: 1224, deadline: null,         pace: '~5 pages / day',      color: '#534AB7', archived: false },
  { id: 'aoi',      title: 'The Age of Innocence',   author: 'Wharton',  group: 'CY',                type: 'percent', current: 50,    total: 100,   deadline: '2026-06-22', pace: null,                     color: '#1D9E75', archived: false },
  { id: 'wtbf',     title: 'Walk the Blue Fields',   author: 'Keegan',   group: 'PBCC',              type: 'percent', current: 0,     total: 100,   deadline: '2026-07-10', pace: null,                     color: '#D85A30', archived: false },
  { id: 'trans',    title: 'Transcription',           author: 'Atkinson', group: 'Personal',          type: 'percent', current: 10,    total: 100,   deadline: null,         pace: 'ASAP',                   color: '#BA7517', archived: false },
  { id: 'bartleby', title: 'Bartleby the Scrivener', author: 'Melville', group: 'CY',                type: 'percent', current: 0,     total: 100,   deadline: '2026-06-29', pace: 'After Age of Innocence', color: '#185FA5', archived: false }
];

let books = [], log = [], notes = {}, weekChart = null, editingId = null;

function setSync(state, msg) {
  const el = document.getElementById('syncStatus');
  el.textContent = msg; el.className = 'sync-status ' + state;
}

async function sbGet(table, params='') {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}${params}`, { headers: H });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function sbUpsert(table, data) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method: 'POST',
    headers: { ...H, 'Prefer': 'resolution=merge-duplicates,return=representation' },
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function sbDelete(table, params) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}${params}`, { method: 'DELETE', headers: H });
  if (!r.ok) throw new Error(await r.text());
}

async function loadFromSupabase() {
  setSync('syncing', 'Loading…');
  try {
    const [dbBooks, dbLog, dbNotes] = await Promise.all([
      sbGet('books', '?select=*'),
      sbGet('reading_log', '?select=*&order=created_at.desc'),
      sbGet('book_notes', '?select=*')
    ]);

    // Start with defaults, merge DB data
    books = JSON.parse(JSON.stringify(defaultBooks));

    // Add any books that exist in DB but not in defaults (user-added)
    dbBooks.forEach(row => {
      const existing = books.find(b => b.id === row.id);
      if (existing) {
        existing.current = row.current;
        if (row.title) existing.title = row.title;
        if (row.author) existing.author = row.author;
        if (row.group_name) existing.group = row.group_name;
        if (row.color) existing.color = row.color;
        if (row.deadline !== undefined) existing.deadline = row.deadline;
        if (row.pace !== undefined) existing.pace = row.pace;
        if (row.book_type) existing.type = row.book_type;
        if (row.total) existing.total = row.total;
        existing.archived = row.archived || false;
      } else {
        // User-added book not in defaults
        books.push({
          id: row.id, title: row.title || 'Untitled', author: row.author || '',
          group: row.group_name || '', type: row.book_type || 'percent',
          current: row.current || 0, total: row.total || 100,
          deadline: row.deadline || null, pace: row.pace || null,
          color: row.color || '#534AB7', archived: row.archived || false
        });
      }
    });

    log = dbLog.map(r => ({ bookId: r.book_id, title: r.book_title, amount: r.amount, unit: r.unit, date: r.logged_date }));
    notes = {};
    dbNotes.forEach(r => { notes[r.book_id] = r.content; });
    setSync('ok', 'Synced ✓');
  } catch(e) {
    console.error(e);
    books = JSON.parse(JSON.stringify(defaultBooks));
    setSync('error', 'Offline — changes won\'t save');
  }
  document.getElementById('loadingOverlay').style.display = 'none';
  renderAll();
}

async function saveBookToDb(book) {
  setSync('syncing', 'Saving…');
  try {
    await sbUpsert('books', {
      id: book.id, current: book.current, title: book.title, author: book.author,
      group_name: book.group, color: book.color, deadline: book.deadline || null,
      pace: book.pace || null, book_type: book.type, total: book.total,
      archived: book.archived || false, updated_at: new Date().toISOString()
    });
    setSync('ok', 'Saved ✓');
  } catch(e) { setSync('error', 'Save failed'); console.error(e); }
}

async function saveNote(bookId) {
  const val = document.getElementById('notes-ta-' + bookId).value;
  notes[bookId] = val;
  try { await sbUpsert('book_notes', { book_id: bookId, content: val, updated_at: new Date().toISOString() }); }
  catch(e) { console.error(e); }
}

async function archiveBook(bookId) {
  const book = books.find(b => b.id === bookId);
  if (!book) return;
  book.archived = true;
  book.current = book.total || 100;
  await saveBookToDb(book);
  renderAll();
}

async function unarchiveBook(bookId) {
  const book = books.find(b => b.id === bookId);
  if (!book) return;
  book.archived = false;
  await saveBookToDb(book);
  renderAll();
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.ceil((new Date(dateStr) - today) / 86400000);
}

function badgeFor(days, pct, archived) {
  if (archived || pct >= 100) return { text: 'Done', cls: 'badge-ok' };
  if (days === null) return { text: 'No deadline', cls: 'badge-neutral' };
  if (days < 0) return { text: 'Overdue', cls: 'badge-danger' };
  if (days === 0) return { text: 'Due today', cls: 'badge-danger' };
  if (days <= 3) return { text: days + 'd left', cls: 'badge-danger' };
  if (days <= 7) return { text: days + 'd left', cls: 'badge-warn' };
  return { text: days + 'd left', cls: 'badge-ok' };
}

function pctFor(book) {
  if (book.archived) return 100;
  if (book.type === 'kindle') return Math.min(100, Math.round((book.current / book.total) * 100)); // pages
  return Math.min(100, Math.round(book.current));
}

function bookCardHTML(book, isArchived) {
  const pct = pctFor(book);
  const days = daysUntil(book.deadline);
  const badge = badgeFor(days, pct, isArchived);
  const deadlineFmt = book.deadline ? new Date(book.deadline).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' }) : null;
  const deadlineCls = !isArchived && days !== null && days <= 3 ? 'deadline-urgent' : !isArchived && days !== null && days <= 7 ? 'deadline-soon' : '';
  const currentDisplay = book.type === 'kindle'
    ? 'p. ' + Number(book.current).toLocaleString() + ' / ' + Number(book.total).toLocaleString()
    : pct + '% complete';
  const bookNote = notes[book.id] || '';

  const archiveAction = isArchived
    ? `<button class="action-btn" onclick="unarchiveBook('${book.id}')">↩ Restore to active</button>`
    : `<button class="action-btn" onclick="if(confirm('Mark as done and archive?')) archiveBook('${book.id}')">✓ Mark done &amp; archive</button>`;

  return `
    <div class="book-card ${isArchived ? 'archived' : ''}">
      <div class="book-top">
        <div>
          <div class="book-title">${book.title}</div>
          <div class="book-meta-line">${book.author}${book.group ? ' &middot; ' + book.group : ''}</div>
        </div>
        <span class="badge ${badge.cls}">${badge.text}</span>
      </div>
      <div class="progress-row">
        <div class="progress-track">
          <div class="progress-fill" style="width:${pct}%;background:${book.color}"></div>
        </div>
        <span class="progress-pct">${pct}%</span>
      </div>
      <div class="book-stats">
        <span class="stat">${currentDisplay}</span>
        ${deadlineFmt ? `<span class="stat ${deadlineCls}">Due ${deadlineFmt}</span>` : ''}
        ${book.pace ? `<span class="stat" style="color:var(--text-muted)">${book.pace}</span>` : ''}
      </div>
      <div class="book-actions">
        ${!isArchived ? `<button class="action-btn" onclick="openEditModal('${book.id}')">✎ Edit</button>` : ''}
        ${archiveAction}
        <button class="action-btn" id="notes-btn-${book.id}" onclick="toggleNotes('${book.id}')">${bookNote ? '− Notes' : '+ Notes'}</button>
      </div>
      <div class="notes-area ${bookNote ? 'open' : ''}" id="notes-area-${book.id}">
        <textarea id="notes-ta-${book.id}" placeholder="Thoughts, passages, things to remember…" oninput="saveNote('${book.id}')">${bookNote}</textarea>
      </div>
    </div>`;
}

function renderBooks() {
  const active = books.filter(b => !b.archived);
  const archived = books.filter(b => b.archived);
  document.getElementById('booksContainer').innerHTML = active.map(b => bookCardHTML(b, false)).join('');
  document.getElementById('archiveContainer').innerHTML = archived.length
    ? archived.map(b => bookCardHTML(b, true)).join('')
    : '<p class="empty-log">No completed books yet.</p>';
}

function toggleNotes(bookId) {
  const area = document.getElementById('notes-area-' + bookId);
  const btn = document.getElementById('notes-btn-' + bookId);
  const isOpen = area.classList.contains('open');
  area.classList.toggle('open', !isOpen);
  btn.textContent = isOpen ? '+ Notes' : '− Notes';
}

function toggleArchive() {
  const el = document.getElementById('archiveContainer');
  const btn = document.getElementById('archiveToggleBtn');
  const isOpen = el.classList.contains('open');
  el.classList.toggle('open', !isOpen);
  btn.textContent = isOpen ? 'Show' : 'Hide';
}

function getLast7Days() {
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    days.push(d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' }));
  }
  return days;
}

function renderChart() {
  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const gridColor = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)';
  const tickColor = isDark ? '#6B6560' : '#9E9890';
  const days = getLast7Days();
  const activeBooks = books.filter(b => !b.archived);

  document.getElementById('chartLegend').innerHTML = activeBooks.map(b =>
    `<span class="legend-item"><span class="legend-dot" style="background:${b.color}"></span>${b.title.split(' ').slice(0,3).join(' ')}</span>`
  ).join('');

  const datasets = activeBooks.map(book => ({
    label: book.title,
    data: days.map(day => log.filter(e => e.bookId === book.id && e.date === day).reduce((s, e) => s + e.amount, 0)),
    backgroundColor: book.color + 'CC', borderColor: book.color, borderWidth: 1
  }));

  if (weekChart) { weekChart.destroy(); weekChart = null; }
  weekChart = new Chart(document.getElementById('weekChart').getContext('2d'), {
    type: 'bar',
    data: { labels: days, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { mode: 'index', intersect: false } },
      scales: {
        x: { stacked: true, ticks: { color: tickColor, font: { size: 11 } }, grid: { color: gridColor } },
        y: { stacked: true, ticks: { color: tickColor, font: { size: 11 } }, grid: { color: gridColor } }
      }
    }
  });
}

function renderLog() {
  const el = document.getElementById('logEntries');
  if (log.length === 0) { el.innerHTML = '<p class="empty-log">No entries yet.</p>'; return; }
  el.innerHTML = log.slice(0, 20).map(e =>
    `<div class="log-entry">
      <span class="log-book">${e.title}</span>
      <span class="log-amount">+${e.amount} ${e.unit}</span>
      <span class="log-date">${e.date}</span>
    </div>`
  ).join('');
}

function populateSelect() {
  const active = books.filter(b => !b.archived);
  document.getElementById('logBook').innerHTML = active.map(b => `<option value="${b.id}">${b.title}</option>`).join('');
}

function renderAll() { renderBooks(); renderLog(); renderChart(); populateSelect(); }

async function logReading() {
  const bookId = document.getElementById('logBook').value;
  const amount = parseFloat(document.getElementById('logAmount').value);
  if (!amount || amount <= 0) return;
  const book = books.find(b => b.id === bookId);
  if (!book) return;

  if (book.type === 'kindle') book.current = Math.min(book.total, book.current + Math.round(amount));
  else book.current = Math.min(100, book.current + amount);

  const dateStr = new Date().toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
  const entry = { bookId: book.id, title: book.title, amount: book.type === 'kindle' ? Math.round(amount) : amount, unit: book.type === 'kindle' ? 'pages' : '%', date: dateStr };
  log.unshift(entry);
  document.getElementById('logAmount').value = '';
  renderAll();

  try {
    await Promise.all([
      saveBookToDb(book),
      sbUpsert('reading_log', { book_id: entry.bookId, book_title: entry.title, amount: entry.amount, unit: entry.unit, logged_date: entry.date })
    ]);
  } catch(e) { console.error(e); }
}

// Modal
function openEditModal(bookId) {
  const book = books.find(b => b.id === bookId);
  if (!book) return;
  editingId = bookId;
  document.getElementById('modalTitle').textContent = 'Edit book';
  document.getElementById('fTitle').value = book.title;
  document.getElementById('fAuthor').value = book.author;
  document.getElementById('fGroup').value = book.group;
  document.getElementById('fType').value = book.type;
  document.getElementById('fTotal').value = book.total;
  document.getElementById('fCurrent').value = book.current;
  document.getElementById('fDeadline').value = book.deadline || '';
  document.getElementById('fPace').value = book.pace || '';
  document.getElementById('fColor').value = book.color;
  document.getElementById('fTotalWrap').style.display = book.type === 'kindle' ? '' : 'none';
  document.getElementById('modalBg').classList.add('open');
}

function openAddModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Add book';
  document.getElementById('fTitle').value = '';
  document.getElementById('fAuthor').value = '';
  document.getElementById('fGroup').value = '';
  document.getElementById('fType').value = 'percent';
  document.getElementById('fTotal').value = '100';
  document.getElementById('fCurrent').value = '0';
  document.getElementById('fDeadline').value = '';
  document.getElementById('fPace').value = '';
  document.getElementById('fColor').value = '#534AB7';
  document.getElementById('fTotalWrap').style.display = 'none';
  document.getElementById('modalBg').classList.add('open');
}

document.getElementById('fType').addEventListener('change', function() {
  document.getElementById('fTotalWrap').style.display = this.value === 'kindle' ? '' : 'none';
});

function closeModal() { document.getElementById('modalBg').classList.remove('open'); editingId = null; }

async function saveModal() {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) { alert('Title is required.'); return; }

  if (editingId) {
    const book = books.find(b => b.id === editingId);
    book.title = title;
    book.author = document.getElementById('fAuthor').value.trim();
    book.group = document.getElementById('fGroup').value.trim();
    book.type = document.getElementById('fType').value;
    book.total = parseFloat(document.getElementById('fTotal').value) || 100;
    book.current = parseFloat(document.getElementById('fCurrent').value) || 0;
    book.deadline = document.getElementById('fDeadline').value || null;
    book.pace = document.getElementById('fPace').value.trim() || null;
    book.color = document.getElementById('fColor').value;
    await saveBookToDb(book);
  } else {
    const newId = 'book_' + Date.now();
    const newBook = {
      id: newId,
      title,
      author: document.getElementById('fAuthor').value.trim(),
      group: document.getElementById('fGroup').value.trim(),
      type: document.getElementById('fType').value,
      total: parseFloat(document.getElementById('fTotal').value) || 100,
      current: parseFloat(document.getElementById('fCurrent').value) || 0,
      deadline: document.getElementById('fDeadline').value || null,
      pace: document.getElementById('fPace').value.trim() || null,
      color: document.getElementById('fColor').value,
      archived: false
    };
    books.push(newBook);
    await saveBookToDb(newBook);
  }

  closeModal();
  renderAll();
}

async function confirmReset() {
  if (!confirm('Reset all progress, notes, and log entries?')) return;
  setSync('syncing', 'Resetting…');
  try {
    await Promise.all([
      sbDelete('books', '?id=neq.none'),
      sbDelete('reading_log', '?id=neq.00000000-0000-0000-0000-000000000000'),
      sbDelete('book_notes', '?book_id=neq.none')
    ]);
    books = JSON.parse(JSON.stringify(defaultBooks));
    log = []; notes = {};
    setSync('ok', 'Reset ✓');
    renderAll();
  } catch(e) { setSync('error', 'Reset failed'); console.error(e); }
}

document.getElementById('todayDate').textContent = new Date().toLocaleDateString('en-IN', {
  weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
});

document.getElementById('modalBg').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

loadFromSupabase();
</script>
